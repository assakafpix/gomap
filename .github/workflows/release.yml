name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/gomap-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gomap-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/gomap-*

  release:
    name: GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gomap-*
          generate_release_notes: true
          body: |
            ## gomap ${{ github.ref_name }}

            SOCKS5-native service detection — nmap-grade fingerprints, single Go binary.

            **Install:**
            ```bash
            go install github.com/assakafpix/gomap@${{ github.ref_name }}
            ```

            **Or download a binary** from the assets below for your platform.

            See [README](https://github.com/assakafpix/gomap#readme) for usage.
